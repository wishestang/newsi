services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: newsi
      POSTGRES_USER: newsi
      POSTGRES_PASSWORD: newsi-local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsi -d newsi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
